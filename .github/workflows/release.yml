name: Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.6'

      - name: Build (linux_386)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=386 go build -o ./build/prometheus-exporter_linux_386

      - name: Build (linux_amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./build/prometheus-exporter_linux_amd64

      - name: Build (linux_arm)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm go build -o ./build/prometheus-exporter_linux_arm

      - name: Build (linux_arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ./build/prometheus-exporter_linux_arm64

      - name: Build (linux_riscv64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=riscv64 go build -o ./build/prometheus-exporter_linux_riscv64

      - name: Build (windows_amd64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ./build/prometheus-exporter_windows_amd64.exe

      - name: Generate Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./build/*"
          tag: "${{ github.ref_name }}"
          name: "${{ github.ref_name }}"
          generateReleaseNotes: true
          allowUpdates: true
          body: |
            ## Extended request statistics (introduced in v1.1.0)

            Seven new aggregated daily-summary series exposed by the exporter:

            | Metric | Labels | Description |
            |---|---|---|
            | `zoraxy_requests_by_ip_version` | `version` (`ipv4`, `ipv6`) | Requests by client IP version |
            | `zoraxy_requests_by_device` | `device` (`desktop`, `mobile`, `bot`) | Requests by client device class |
            | `zoraxy_requests_by_browser` | `browser` | Requests by client browser family |
            | `zoraxy_requests_by_os` | `os` | Requests by client OS family |
            | `zoraxy_requests_by_os_version` | `os_version` | Requests by client OS version (top 20 + `other`) |
            | `zoraxy_requests_by_file_type` | `type` | Requests by requested file extension |
            | `zoraxy_requests_by_referer` | `host` | Requests by referer host (top 20 + `other`, `direct` for missing) |

            The shipped Grafana dashboard (`grafana-dashboard.json`) includes matching panels for all seven series.

            ---
